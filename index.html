<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixly - Explain & Fix Errors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-icon">&gt;_</span>
        <h1>Fixly</h1>
      </div>
      <p class="tagline">Paste your error. Get a clear explanation and fix.</p>
    </header>

    <main>
      <section class="input-section">
        <label for="error-input" class="input-label">
          <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          Paste your error message or stack trace
        </label>
        <textarea
          id="error-input"
          placeholder="TypeError: Cannot read properties of undefined (reading 'map')&#10;    at App (App.jsx:15:24)&#10;    at renderWithHooks (react-dom.development.js:14985)"
          spellcheck="false"
        ></textarea>
      </section>

      <div class="api-section">
        <label for="api-key" class="api-label">
          <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Gemini API Key
        </label>
        <input
          type="password"
          id="api-key"
          placeholder="Enter your Google Gemini API key"
        />
        <span class="api-hint">Stored locally in your browser only</span>
      </div>

      <button id="explain-btn" class="explain-btn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span class="btn-text">Explain & Fix</span>
        <svg class="btn-loader" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
      </button>

      <section id="result-section" class="result-section hidden">
        <div class="result-header">
          <h2 id="result-title"></h2>
          <button id="copy-btn" class="copy-btn" title="Copy to clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
        <div id="result-content" class="result-content"></div>
      </section>
    </main>

    <footer>
      <p>Powered by Google Gemini &bull; Built for developers</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
